<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Street - AI Agent潮流穿搭平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0D0D1A 0%, #1A1A2E 50%, #16213E 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(107,92,231,0.1) 25%, rgba(107,92,231,0.2) 50%, rgba(107,92,231,0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 10px;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 87, 87, 0.1);
            border: 1px solid rgba(255, 87, 87, 0.3);
            border-radius: 15px;
            margin: 1rem 0;
        }

        .error-state .error-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .error-state .error-message {
            color: #ff6b6b;
        }

        .retry-btn {
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background: linear-gradient(90deg, #6B5CE7, #00FFD1);
            border: none;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .retry-btn:hover {
            transform: scale(1.05);
        }

        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00FFD1;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.8; }
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 13, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(107, 92, 231, 0.3);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #6B5CE7, #00FFD1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .achievement-btn {
            position: relative;
            width: 40px;
            height: 40px;
            background: rgba(107, 92, 231, 0.2);
            border: 1px solid rgba(107, 92, 231, 0.3);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .achievement-btn:hover {
            background: rgba(107, 92, 231, 0.4);
            transform: scale(1.1);
        }

        .achievement-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            min-width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 9px;
            font-size: 0.65rem;
            font-weight: 700;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }

        .points {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 255, 209, 0.1);
            border: 1px solid rgba(0, 255, 209, 0.3);
            border-radius: 20px;
        }

        .points-icon { font-size: 1.2rem; }
        .points-value { font-weight: 600; color: #00FFD1; }

        .my-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #6B5CE7;
            cursor: pointer;
            transition: all 0.3s;
        }

        .my-avatar:hover {
            box-shadow: 0 0 20px rgba(107, 92, 231, 0.5);
        }

        /* Mobile Toggle for Left Panel */
        .mobile-toggle {
            display: none;
            position: fixed;
            top: 80px;
            left: 10px;
            z-index: 99;
            width: 44px;
            height: 44px;
            background: rgba(107, 92, 231, 0.8);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(107, 92, 231, 0.4);
        }

        /* Main Content */
        main {
            position: relative;
            z-index: 1;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Left Panel - My Agent */
        .my-agent {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(107, 92, 231, 0.3);
            padding: 2rem;
            position: sticky;
            top: 100px;
            height: fit-content;
            transition: transform 0.3s ease;
        }

        .agent-avatar-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 1.5rem;
        }

        .agent-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #6B5CE7, #00FFD1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 40px rgba(107, 92, 231, 0.4);
            position: relative;
            overflow: hidden;
        }

        .agent-avatar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .rarity-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .rarity-ssr { background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .rarity-sr { background: linear-gradient(90deg, #C0C0C0, #A0A0A0); color: #000; }
        .rarity-r { background: linear-gradient(90deg, #CD7F32, #A0522D); color: #fff; }

        .agent-name {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .agent-title {
            text-align: center;
            color: #00FFD1;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .outfit-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .outfit-slot {
            aspect-ratio: 1;
            background: rgba(107, 92, 231, 0.1);
            border: 1px dashed rgba(107, 92, 231, 0.5);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .outfit-slot:hover {
            border-color: #00FFD1;
            background: rgba(0, 255, 209, 0.1);
        }

        .outfit-slot.equipped {
            border-style: solid;
            border-color: #6B5CE7;
            background: rgba(107, 92, 231, 0.2);
        }

        .slot-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
        .slot-name { font-size: 0.7rem; color: #888; }

        .fashion-score {
            text-align: center;
            padding: 1rem;
            background: linear-gradient(135deg, rgba(107, 92, 231, 0.2), rgba(0, 255, 209, 0.1));
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .score-label { font-size: 0.8rem; color: #888; margin-bottom: 0.3rem; }

        .score-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, #6B5CE7, #00FFD1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .style-tags {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .style-tag {
            padding: 0.3rem 0.8rem;
            background: rgba(107, 92, 231, 0.2);
            border-radius: 15px;
            font-size: 0.8rem;
            color: #B8B5FF;
        }

        /* Right Panel - Alliance Wall */
        .alliance-wall {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .wall-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .wall-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
        }

        .wall-tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            background: rgba(107, 92, 231, 0.1);
            border: 1px solid rgba(107, 92, 231, 0.3);
            border-radius: 20px;
            color: #B8B5FF;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .tab:hover {
            background: rgba(107, 92, 231, 0.2);
        }

        .tab.active {
            background: linear-gradient(90deg, #6B5CE7, #00FFD1);
            border-color: transparent;
            color: #fff;
        }

        .outfits-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .outfit-card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(107, 92, 231, 0.2);
            overflow: hidden;
            transition: all 0.3s;
        }

        .outfit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(107, 92, 231, 0.3);
            border-color: rgba(0, 255, 209, 0.3);
        }

        .card-image {
            position: relative;
            height: 180px;
            background: linear-gradient(135deg, rgba(107, 92, 231, 0.2), rgba(0, 255, 209, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-avatar {
            font-size: 5rem;
            transition: transform 0.3s;
        }

        .outfit-card:hover .card-avatar {
            transform: scale(1.1);
        }

        .card-rarity {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 0.3rem 0.6rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .card-content { padding: 1.2rem; }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .card-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
        }

        .card-score {
            font-weight: 700;
            color: #00FFD1;
            font-size: 1.2rem;
        }

        .card-outfit {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .mini-item {
            width: 32px;
            height: 32px;
            background: rgba(107, 92, 231, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-tags { display: flex; gap: 0.3rem; flex-wrap: wrap; }

        .card-tag {
            padding: 0.2rem 0.5rem;
            background: rgba(0, 255, 209, 0.1);
            border-radius: 10px;
            font-size: 0.7rem;
            color: #00FFD1;
        }

        .card-likes {
            color: #ff6b8a;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(13, 13, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(107, 92, 231, 0.3);
            padding: 0.8rem 0;
            display: flex;
            justify-content: space-around;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            color: #00FFD1;
        }

        .nav-icon { font-size: 1.5rem; }
        .nav-label { font-size: 0.7rem; }

        /* Loading Spinner */
        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 3rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(107, 92, 231, 0.2);
            border-top-color: #6B5CE7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
                padding: 1rem;
                padding-bottom: 80px;
            }

            .mobile-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .my-agent {
                position: fixed;
                top: 0;
                left: 0;
                width: 300px;
                height: 100vh;
                border-radius: 0 20px 20px 0;
                z-index: 98;
                transform: translateX(-100%);
            }

            .my-agent.show {
                transform: translateX(0);
            }

            .outfits-grid {
                grid-template-columns: 1fr;
            }

            .bottom-nav {
                display: flex;
            }

            header {
                padding: 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .header-right {
                gap: 1rem;
            }

            .points {
                padding: 0.4rem 0.8rem;
                font-size: 0.9rem;
            }

            .wall-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .wall-tabs {
                width: 100%;
                overflow-x: auto;
            }

            .tab {
                white-space: nowrap;
            }
        }

        /* Hide on desktop, show on mobile */
        @media (min-width: 901px) {
            .mobile-toggle {
                display: none !important;
            }
        }

        /* Add padding for bottom nav on mobile */
        @media (max-width: 900px) {
            body {
                padding-bottom: 70px;
            }
        }

        /* ========== Search & Filter Styles (Day 2) ========== */
        .search-filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            background: rgba(107, 92, 231, 0.1);
            border: 1px solid rgba(107, 92, 231, 0.3);
            border-radius: 20px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-input:focus {
            border-color: #00FFD1;
            box-shadow: 0 0 15px rgba(0, 255, 209, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            font-size: 0.9rem;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(107, 92, 231, 0.1);
            border: 1px solid rgba(107, 92, 231, 0.3);
            border-radius: 15px;
            color: #B8B5FF;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .filter-btn:hover {
            background: rgba(107, 92, 231, 0.2);
            border-color: rgba(0, 255, 209, 0.3);
        }

        .filter-btn.active {
            background: linear-gradient(90deg, #6B5CE7, #00FFD1);
            border-color: transparent;
            color: #fff;
        }

        .results-count {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            color: #888;
            font-size: 0.85rem;
        }

        .results-count .count {
            color: #00FFD1;
            font-weight: 600;
        }

        .clear-search {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.3rem 0.5rem;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .clear-search:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        .no-results {
            text-align: center;
            padding: 2rem;
            background: rgba(107, 92, 231, 0.1);
            border: 1px dashed rgba(107, 92, 231, 0.3);
            border-radius: 15px;
        }

        .no-results .search-icon-large {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .no-results .message {
            color: #B8B5FF;
            margin-bottom: 0.5rem;
        }

        .no-results .suggestion {
            color: #888;
            font-size: 0.85rem;
        }

        /* ========== Sort Styles (Day 3) ========== */
        .sort-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(107, 92, 231, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(107, 92, 231, 0.1);
        }

        .sort-options {
            display: flex;
            gap: 0.3rem;
        }

        .sort-btn {
            padding: 0.4rem 0.8rem;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .sort-btn:hover {
            color: #B8B5FF;
            background: rgba(107, 92, 231, 0.1);
        }

        .sort-btn.active {
            color: #00FFD1;
            background: rgba(0, 255, 209, 0.1);
        }

        .sort-btn .sort-icon {
            font-size: 0.9rem;
        }

        /* ========== Enhanced Card Animations (Day 3) ========== */
        .outfit-card {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(107, 92, 231, 0.2);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
        }

        .outfit-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .outfit-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(107, 92, 231, 0.4);
            border-color: rgba(0, 255, 209, 0.4);
        }

        .outfit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 209, 0.1), transparent);
            transition: left 0.5s;
            pointer-events: none;
        }

        .outfit-card:hover::before {
            left: 100%;
        }

        /* Rarity glow effect on hover */
        .outfit-card[data-rarity="ssr"]:hover {
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3), 0 0 30px rgba(255, 165, 0, 0.2);
        }

        .outfit-card[data-rarity="sr"]:hover {
            box-shadow: 0 20px 40px rgba(192, 192, 192, 0.3), 0 0 30px rgba(192, 192, 192, 0.2);
        }

        /* Like button animation */
        .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            padding: 0.2rem;
        }

        .like-btn:hover {
            transform: scale(1.2);
        }

        .like-btn.liked {
            animation: heartBeat 0.6s ease;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ========== Agent Detail Modal (Day 4) ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 1rem;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {

        // 初始化用户统计
        function initUserStats() {
            const today = new Date().toDateString();
            
            if (!userStats.likedCount) userStats.likedCount = likedAgents.length;
            if (!userStats.followedCount) userStats.followedCount = followedAgents.length;
            if (!userStats.shareCount) userStats.shareCount = 0;
            if (!userStats.viewedCount) userStats.viewedCount = 0;
            if (!userStats.hotViewCount) userStats.hotViewCount = 0;
            if (!userStats.rarityTypes) userStats.rarityTypes = [];
            if (!userStats.lastVisit) userStats.lastVisit = null;
            if (!userStats.streakDays) userStats.streakDays = 0;
            if (!userStats.dailyVisits) userStats.dailyVisits = 0;

            // 检查连续访问
            if (userStats.lastVisit) {
                const lastDate = new Date(userStats.lastVisit);
                const todayDate = new Date(today);
                const diffDays = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    userStats.streakDays++;
                } else if (diffDays > 1) {
                    userStats.streakDays = 1;
                }
            } else {
                userStats.streakDays = 1;
            }

            // 检查今日首次访问
            if (userStats.lastVisit !== today) {
                userStats.dailyVisits++;
                userStats.lastVisit = today;
            }

            saveUserStats();
        }

        function saveUserStats() {
            localStorage.setItem('userStats', JSON.stringify(userStats));

        function checkAchievements() {
            const newUnlocks = [];
            
            Object.values(ACHIEVEMENTS).flat().forEach(achievement => {
                if (unlockedAchievements.includes(achievement.id)) return;
                
                let currentValue = userStats[achievement.key] || 0;
                
                // 特殊处理稀有度类型
                if (achievement.key === 'rarityTypes') {
                    currentValue = [...new Set([...likedAgents.map(id => {
                        const agent = allAgentsData.find(a => a.id === id) || agentsData.find(a => a.id === id);
                        return agent?.rarity;
                    }).filter(Boolean), ...(userStats.rarityTypes || [])])].length;
                }
                
                if (currentValue >= achievement.target) {
                    unlockedAchievements.push(achievement.id);
                    newUnlocks.push(achievement);
                }
            });

            if (newUnlocks.length > 0) {
                localStorage.setItem('unlockedAchievements', JSON.stringify(unlockedAchievements));
                showUnlockToast(newUnlocks[0]);
                updateAchievementBadge();
            }
        }

        // ========== Sort Functions (Day 3) ==========
        function handleSort(sortType) {
            // 更新按钮状态
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sort === sortType);
            });
            
            currentSort = sortType;
            applyFilters();
        }

        function sortAgents(agents) {
            const sorted = [...agents];
            
            switch (currentSort) {
                case 'latest':
                    // 最新 - 随机打乱模拟新加入
                    return sorted.sort(() => Math.random() - 0.5);
                case 'rarity':
                    // 稀有度 - SSR > SR > R
                    const rarityOrder = { 'ssr': 0, 'sr': 1, 'r': 2 };
                    return sorted.sort((a, b) => (rarityOrder[a.rarity] || 2) - (rarityOrder[b.rarity] || 2));
                case 'hot':
                    // 热度 - 按点赞数
                    return sorted.sort((a, b) => b.likes - a.likes);
                default:
                    // 默认 - 综合排序（保持原顺序）
                    return sorted;
            }
        }

        // ========== Filter & Apply Functions (Day 2) ==========
        function filterAgents() {
            let filtered = [...allAgentsData];

            // 按名称搜索
            if (currentSearch.trim()) {
                const searchLower = currentSearch.toLowerCase().trim();
                filtered = filtered.filter(agent =>
                    agent.name.toLowerCase().includes(searchLower)
                );
            }

            // 按稀有度筛选
            if (currentRarity !== 'all') {
                filtered = filtered.filter(agent =>
                    agent.rarity === currentRarity
                );
            }

            return filtered;
        }

        function applyFilters() {
            let filtered = filterAgents();
            
            // 应用排序 (Day 3)
            filtered = sortAgents(filtered);

            // 更新结果计数
            document.getElementById('filteredCount').textContent = filtered.length;

            // 渲染过滤后的结果
            const container = document.getElementById('outfits-container');
            if (filtered.length === 0) {
                container.innerHTML = renderNoResults();
            } else {
                container.innerHTML = filtered.map((agent, index) => renderAgentCard(agent, index)).join('');
            }

            agentsData = filtered;
            
            // 添加入场动画
            animateCardsIn();
        }

        function animateCardsIn() {
            const cards = document.querySelectorAll('.outfit-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 50);
            });
        }

        function renderNoResults() {
            return `
                <div class="no-results">
                    <div class="search-icon-large">🔍</div>
                    <div class="message">没有找到匹配的Agent</div>
                    <div class="suggestion">试试其他关键词或筛选条件</div>
                    <button class="clear-search" onclick="clearFilters()" style="margin-top: 1rem;">清除筛选</button>
                </div>
            `;
        }

        function clearFilters() {
            currentSearch = '';
            currentRarity = 'all';
            currentSort = 'default';
            document.getElementById('searchInput').value = '';

            // 重置筛选按钮状态
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.rarity === 'all');
            });
            
            // 重置排序按钮状态
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.sort === 'default');
            });

            // 重新应用筛选
            applyFilters();
        }

        // ========== Like Function (Day 3) ==========
        function toggleLike(agentId, event) {
            event.stopPropagation();
            
            const btn = document.querySelector(`.like-btn[data-agent-id="${agentId}"]`);
            if (!btn) return;
            
            const index = likedAgents.indexOf(agentId);
            const agent = allAgentsData.find(a => a.id === agentId) || agentsData.find(a => a.id === agentId);
            
            if (index === -1) {
                // 点赞
                likedAgents.push(agentId);
                btn.classList.add('liked');
                btn.innerHTML = `❤️ <span class="like-count">${(agent?.likes || 0) + 1}</span>`;
                
                // 更新成就统计
                userStats.likedCount = likedAgents.length;
                saveUserStats();
                checkAchievements();
            } else {
                // 取消点赞
                likedAgents.splice(index, 1);
                btn.classList.remove('liked');
                btn.innerHTML = `🤍 <span class="like-count">${agent?.likes || 0}</span>`;
                
                // 更新成就统计
                userStats.likedCount = likedAgents.length;
                saveUserStats();
            }
            
            // 保存到本地存储
            localStorage.setItem('likedAgents', JSON.stringify(likedAgents));
            
            // 添加心跳动画
            btn.classList.add('liked');
            setTimeout(() => btn.classList.remove('liked'), 600);
        }

        function setupSearchListeners() {
            const searchInput = document.getElementById('searchInput');
            let debounceTimer;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    currentSearch = e.target.value;
                    applyFilters();
                }, 300);
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    clearFilters();
                }
            });
        }

        function setupFilterListeners() {
            const filterGroup = document.getElementById('filterGroup');

            filterGroup.addEventListener('click', (e) => {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;

                // 更新按钮状态
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // 更新筛选条件
                currentRarity = btn.dataset.rarity;
                applyFilters();
            });
        }

        async function loadTabData(tabType) {
            const container = document.getElementById('outfits-container');
            container.innerHTML = renderLoading();

            try {
                let agents;
                
                if (tabType === 'following') {
                    // 关注列表使用本地存储
                    const followingIds = JSON.parse(localStorage.getItem('following') || '[]');
                    agents = mockFollowing.filter(a => followingIds.includes(a.id));
                } else {
                    // 尝试从API获取
                    const apiData = await fetchLeaderboard(tabType);
                    if (apiData && apiData.agents) {
                        agents = apiData.agents.map(a => ({
                            id: a.agent_id,
                            name: a.agent_name,
                            score: a.total_style_score || a.fashion_score || 0,
                            avatar: getAvatarEmoji(a.rarity),
                            rarity: mapRarity(a.top_rarity),
                            items: generateRandomItems(),
                            tags: generateRandomTags(),
                            likes: Math.floor(Math.random() * 200) + 10
                        }));
                    } else {
                        // 使用模拟数据
                        agents = [...mockAgents].sort((a, b) => {
                            return tabType === 'hot' ? b.score - a.score : 
                                   new Date(b.created_at) - new Date(a.created_at);
                        });
                    }
                }

                if (agents.length === 0) {
                    container.innerHTML = renderEmptyState(tabType);
                } else {
                    container.innerHTML = agents.map((agent, index) => renderAgentCard(agent, index)).join('');
                    // 添加入场动画
                    setTimeout(animateCardsIn, 50);
                }

                // 保存原始数据用于搜索和筛选 (Day 2)
                allAgentsData = agents;
                agentsData = agents;

                // 重置搜索、筛选和排序状态
                currentSearch = '';
                currentRarity = 'all';
                currentSort = 'default';
                document.getElementById('searchInput').value = '';
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.rarity === 'all');
                });
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.sort === 'default');
                });

                // 更新结果计数
                document.getElementById('filteredCount').textContent = agents.length;
            } catch (error) {
                console.error('Load data error:', error);
                container.innerHTML = renderError('加载失败，请稍后重试');
            }
        }

            document.getElementById('modal-name').textContent = agent.name;

                followedAgents.push(agentId);

                saveUserStats();
                checkAchievements();
            } else {
                // 取消关注
                followedAgents.splice(index, 1);
                showToast('已取消关注');
                
                // 更新成就统计
                userStats.followedCount = followedAgents.length;
                saveUserStats();
            }

            // 保存到本地存储
            localStorage.setItem('followedAgents', JSON.stringify(followedAgents));
            updateFollowButton(agentId);

            // 如果在关注 Tab，重新加载
            if (currentTab === 'following') {
                loadTabData('following');
            }
        }

        function shareAgent() {
            if (!currentModalAgent) return;

            const agent = currentModalAgent;
            const shareText = `来看看 ${agent.name} 的潮流穿搭！时尚值 ${agent.score}，稀有度 ${agent.rarity.toUpperCase()}！✨ #AgentStreet #AI潮流`;

            // 尝试使用 Web Share API（移动端）
            if (navigator.share) {
                navigator.share({
                    title: 'Agent Street',
                    text: shareText,
                    url: window.location.href
                }).catch(() => {
                    copyToClipboard(shareText);
                });
            } else {
                // 回退到复制到剪贴板
                copyToClipboard(shareText);
            }

            // 分享按钮动画
            const btn = event.target.closest('.modal-btn-secondary');
            btn.classList.add('clicked');
            setTimeout(() => btn.classList.remove('clicked'), 300);

            // 更新成就统计
            userStats.shareCount = (userStats.shareCount || 0) + 1;
            saveUserStats();
            checkAchievements();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('分享内容已复制到剪贴板');
            }).catch(() => {
                showToast('复制失败，请手动复制');
            });
        }

        function showToast(message) {
            // 创建 toast 元素
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(107, 92, 231, 0.9);
                color: #fff;
                padding: 0.8rem 1.5rem;
                border-radius: 20px;
                font-size: 0.9rem;
                z-index: 2000;
                animation: toastIn 0.3s ease;
            `;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // 添加 toast 动画样式
        const toastStyle = document.createElement('style');
        toastStyle.textContent = `
            @keyframes toastIn {
                from { opacity: 0; transform: translateX(-50%) translateY(20px); }
                to { opacity: 1; transform: translateX(-50%) translateY(0); }
            }
            @keyframes toastOut {
                from { opacity: 1; transform: translateX(-50%) translateY(0); }
                to { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }
        `;
        document.head.appendChild(toastStyle);

        // ========== Helper Functions ==========
        function getAvatarEmoji(rarity) {
            const emojis = {
                mythic: ['🌟', '💎', '👑'],
                legendary: ['🔥', '⚡', '💫'],
                epic: ['🎭', '🎨', '🌙'],
                uncommon: ['🦊', '🐱', '🦋'],
                regular: ['👾', '🤖', '💭']
            };
            const list = emojis[rarity] || emojis.regular;
            return list[Math.floor(Math.random() * list.length)];
        }

        function mapRarity(rarity) {
            const map = { mythic: 'ssr', legendary: 'ssr', epic: 'sr', uncommon: 'sr', regular: 'r' };
            return map[rarity] || 'r';
        }

        function generateRandomItems() {
            const allItems = ['🎧', '🧥', '👟', '⌚', '🎀', '👗', '👠', '💍', '✨', '🧢', '👕', '👖', '🕶️', '🦺', '💫', '🎭', '👚', '👜', '🌟', '🌙', '👘', '🥿'];
            const count = Math.floor(Math.random() * 3) + 3;
            const shuffled = allItems.sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function generateRandomTags() {
            const allTags = ['#街头', '#科技', '#赛博朋克', '#可爱', '#优雅', '#暗黑', '#极简', '#未来', '#艺术', '#复古', '#梦幻', '#东方', '#运动'];
            const count = Math.floor(Math.random() * 2) + 1;
            const shuffled = allTags.sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // ========== UI Functions ==========
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        function setupTabListeners() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.dataset.tab;
                    loadTabData(currentTab);
                });
            });
        }

        function setupNavListeners() {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        function setupMobileToggle() {
            const toggle = document.getElementById('mobileToggle');
            const panel = document.getElementById('myAgentPanel');
            
            toggle.addEventListener('click', () => {
                panel.classList.toggle('show');
            });

            // Close on outside click
            document.addEventListener('click', (e) => {
                if (window.innerWidth <= 900) {
                    if (!panel.contains(e.target) && !toggle.contains(e.target)) {
                        panel.classList.remove('show');
                    }
                }
            });
        }

        async function loadMyAgent() {
            const agent = await fetchMyAgent();
            
            document.getElementById('my-name').textContent = agent.name || 'Power';
            document.getElementById('my-points').textContent = agent.balance || 150;
            document.getElementById('my-score').textContent = agent.style_score || agent.fashion_score || 850;
            document.getElementById('my-rarity').textContent = agent.rarity === 'ssr' ? 'SSR' : 'SR';
            
            // Update avatar emoji based on rarity
            if (agent.rarity) {
                const rarityMap = { mythic: '🌟', legendary: '🔥', epic: '🎭', uncommon: '🦊', regular: '🤖' };
                document.getElementById('my-avatar-emoji').textContent = rarityMap[agent.rarity] || '🤖';
            }
        }

        function startAutoRefresh() {
            // Refresh every 30 seconds
            refreshInterval = setInterval(() => {
                loadTabData(currentTab);
            }, 30000);
        }

        // ========== Initialize ==========
        async function init() {
            // 初始化成就系统 (Day 5)
            initUserStats();
            updateAchievementBadge();
            
            createParticles();
            setupTabListeners();
            setupNavListeners();
            setupMobileToggle();
            setupSearchListeners(); // Day 2: 搜索功能
            setupFilterListeners(); // Day 2: 筛选功能
            setupModalListeners(); // Day 4: 弹窗关闭事件

            // Load initial data
            await Promise.all([
                loadMyAgent(),
                loadTabData('hot')
            ]);
            
            startAutoRefresh();
            
            // 检查成就 (Day 5)
            checkAchievements();
        }

        // ========== Modal Event Listeners (Day 4) ==========
        function setupModalListeners() {
            const modal = document.getElementById('agent-modal');

            // 点击遮罩关闭
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModal();
                }
            });

            // ESC 键关闭
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    closeModal();
                }
            });
        }

        // Run on DOM ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
